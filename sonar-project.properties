sonar.projectKey=SmartProperty-Backend
sonar.projectName=SmartProperty Backend
sonar.projectVersion=1.0

# Backend only
sonar.sources=backend/src
sonar.tests=backend/src
sonar.test.inclusions=**/*.spec.ts

# Ignore useless folders
sonar.exclusions=**/node_modules/**

# Coverage report (generated by Jest)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

sonar.sourceEncoding=UTF-8