# ===========================================
# SMARTPROPERTY - DOCKER COMPOSE CONFIGURATION
# ===========================================
# Development Environment Setup

services:
  # =====================
  # MongoDB Database
  # =====================
  mongodb:
    image: mongo:7.0
    container_name: smartproperty-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: smartproperty_user
      MONGO_INITDB_ROOT_PASSWORD: smartproperty_pass_2024
      MONGO_INITDB_DATABASE: smartproperty
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =====================
  # Mongo Express (MongoDB GUI)
  # =====================
  mongo-express:
    image: mongo-express:1.0.2
    container_name: smartproperty-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: smartproperty_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: smartproperty_pass_2024
      ME_CONFIG_MONGODB_URL: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    ports:
      - "8081:8081"
    networks:
      - smartproperty-network

  # =====================
  # Redis Cache
  # =====================
  redis:
    image: redis:7.2-alpine
    container_name: smartproperty-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # Redis Commander (Redis GUI)
  # =====================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smartproperty-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_dev_password_2024
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8082:8081"
    networks:
      - smartproperty-network

  # =====================
  # MailHog (Email Testing)
  # =====================
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: smartproperty-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - smartproperty-network

  # =====================
  # AI Services (FastAPI)
  # =====================
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: smartproperty-ai
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      MONGODB_URI: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/smartproperty?authSource=admin
      MONGODB_DB_NAME: smartproperty
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_dev_password_2024
      BACKEND_API_URL: http://localhost:3000/api
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-services/app:/app/app
      - ./ai-services/models:/app/models
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =====================
# Volumes
# =====================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

# =====================
# Networks
# =====================
networks:
  smartproperty-network:
    driver: bridge
