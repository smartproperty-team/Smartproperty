# ===========================================
# SMARTPROPERTY - DOCKER COMPOSE CONFIGURATION
# ===========================================
# Full-stack development environment
# Usage:
#   Start everything:     docker compose up -d
#   Start infra only:     docker compose up -d mongodb redis mailhog
#   View logs:            docker compose logs -f backend frontend
#   Rebuild after change: docker compose up -d --build backend
#   Stop everything:      docker compose down
#   Reset all data:       docker compose down -v

services:
  # =====================
  # MongoDB Database
  # =====================
  mongodb:
    image: mongo:7.0
    container_name: smartproperty-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: smartproperty_user
      MONGO_INITDB_ROOT_PASSWORD: smartproperty_pass_2024
      MONGO_INITDB_DATABASE: smartproperty
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =====================
  # Mongo Express (MongoDB GUI)
  # =====================
  mongo-express:
    image: mongo-express:1.0.2
    container_name: smartproperty-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: smartproperty_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: smartproperty_pass_2024
      ME_CONFIG_MONGODB_URL: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    ports:
      - "8081:8081"
    networks:
      - smartproperty-network

  # =====================
  # Redis Cache
  # =====================
  redis:
    image: redis:7.2-alpine
    container_name: smartproperty-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # Redis Commander (Redis GUI)
  # =====================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smartproperty-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_dev_password_2024
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8082:8081"
    networks:
      - smartproperty-network

  # =====================
  # MailHog (Email Testing)
  # =====================
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: smartproperty-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - smartproperty-network

  # =====================
  # Backend (NestJS API)
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: smartproperty-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_NAME: SmartProperty API
      # MongoDB - uses Docker service name, not localhost
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: smartproperty
      MONGODB_USERNAME: smartproperty_user
      MONGODB_PASSWORD: smartproperty_pass_2024
      MONGODB_URI: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/smartproperty?authSource=admin
      # Redis - uses Docker service name
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_dev_password_2024
      REDIS_URL: redis://:redis_dev_password_2024@redis:6379
      # JWT
      JWT_SECRET: smartproperty_jwt_secret_dev_2024_change_in_prod
      JWT_EXPIRATION: 1d
      JWT_REFRESH_SECRET: smartproperty_refresh_secret_dev_2024
      JWT_REFRESH_EXPIRATION: 7d
      # CORS
      CORS_ORIGIN: http://localhost:5173
      # Email - uses MailHog
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_NAME: SmartProperty
      SMTP_FROM_EMAIL: noreply@smartproperty.com
      # Rate Limiting
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      # Google OAuth (override with your own values)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback
      GOOGLE_FRONTEND_CALLBACK_URL: http://localhost:5174/auth/google/callback
      # reCAPTCHA
      RECAPTCHA_SECRET_KEY: ""
      # MinIO (S3-compatible storage)
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: smartproperty_minio
      MINIO_SECRET_KEY: smartproperty_minio_secret_2024
      MINIO_BUCKET_NAME: smartproperty
      MINIO_PUBLIC_URL: http://localhost:9000
      # Logging
      LOG_LEVEL: debug
      # GraphQL
      GRAPHQL_PLAYGROUND: "true"
      GRAPHQL_DEBUG: "true"
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot-reload
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      # Don't override node_modules from container
      - backend_node_modules:/app/node_modules
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =====================
  # Frontend (Vite + React)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: smartproperty-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      VITE_RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-placeholder}
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-placeholder}
    ports:
      - "5173:5173"
    volumes:
      # Mount source code for HMR (Hot Module Replacement)
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/locales:/app/locales
      # Don't override node_modules from container
      - frontend_node_modules:/app/node_modules
    networks:
      - smartproperty-network

  # =====================
  # AI Services (FastAPI)
  # =====================
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: smartproperty-ai
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      MONGODB_URI: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/smartproperty?authSource=admin
      MONGODB_DB_NAME: smartproperty
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_dev_password_2024
      BACKEND_API_URL: http://backend:3000/api
      JWT_SECRET: smartproperty_jwt_secret_dev_2024_change_in_prod
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: smartproperty_minio
      MINIO_SECRET_KEY: smartproperty_minio_secret_2024
    ports:
      - "8000:8000"
    volumes:
      - ./ai-services/app:/app/app
      - ./ai-services/models:/app/models
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =====================
  # MinIO (S3-Compatible Object Storage)
  # =====================
  minio:
    image: minio/minio:latest
    container_name: smartproperty-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartproperty_minio
      MINIO_ROOT_PASSWORD: smartproperty_minio_secret_2024
    ports:
      - "9000:9000" # API endpoint
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =====================
  # Jenkins (CI/CD Server)
  # =====================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: smartproperty-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - smartproperty-network
    environment:
      JAVA_OPTS: "-Xmx1024m"

  # =====================
  # SonarQube (Code Quality)
  # =====================
  sonarqube:
    image: sonarqube:lts-community
    container_name: smartproperty-sonarqube
    restart: unless-stopped
    ports:
      - "9092:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - smartproperty-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# =====================
# Volumes
# =====================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  jenkins_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

# =====================
# Networks
# =====================
networks:
  smartproperty-network:
    driver: bridge
