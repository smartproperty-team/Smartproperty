apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-services
  namespace: smartproperty
  labels:
    app: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-services
  template:
    metadata:
      labels:
        app: ai-services
    spec:
      containers:
        - name: ai-services
          image: smartproperty-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smartproperty-secrets
                  key: MONGODB_URI
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartproperty-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartproperty-secrets
                  key: JWT_SECRET
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: smartproperty-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: smartproperty-secrets
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-services
  namespace: smartproperty
spec:
  selector:
    app: ai-services
  ports:
    - port: 8000
      targetPort: 8000
