apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: smartproperty
  labels:
    app: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:1.0.2
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              value: smartproperty_user
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              value: smartproperty_pass_2024
            - name: ME_CONFIG_MONGODB_URL
              value: mongodb://smartproperty_user:smartproperty_pass_2024@mongodb:27017/smartproperty?authSource=admin
            - name: ME_CONFIG_BASICAUTH
              value: "false"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: smartproperty
spec:
  type: NodePort
  selector:
    app: mongo-express
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
